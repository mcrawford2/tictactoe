<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Flask Tic-Tac-Toe</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
	<main class="page">
		<section class="card">
			<h1>Tic-Tac-Toe</h1>
			<form id="name-form" class="name-form" autocomplete="off">
				<label for="player-x-name">Player X</label>
				<input id="player-x-name" name="player-x-name" type="text" maxlength="20" placeholder="Player X">
				<label for="player-o-name">Player O</label>
				<input id="player-o-name" name="player-o-name" type="text" maxlength="20" placeholder="Player O">
				<button type="submit" class="set-names">Set Names</button>
			</form>
			<p id="status" class="status">Loading game...</p>

			<div class="board" id="board" aria-label="Tic-Tac-Toe board">
				<button class="cell" data-position="0" aria-label="Cell 1"></button>
				<button class="cell" data-position="1" aria-label="Cell 2"></button>
				<button class="cell" data-position="2" aria-label="Cell 3"></button>
				<button class="cell" data-position="3" aria-label="Cell 4"></button>
				<button class="cell" data-position="4" aria-label="Cell 5"></button>
				<button class="cell" data-position="5" aria-label="Cell 6"></button>
				<button class="cell" data-position="6" aria-label="Cell 7"></button>
				<button class="cell" data-position="7" aria-label="Cell 8"></button>
				<button class="cell" data-position="8" aria-label="Cell 9"></button>
			</div>

			<button id="new-game" class="new-game">New Game</button>
		</section>
	</main>

	<script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
